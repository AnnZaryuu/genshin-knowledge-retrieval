<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genshin Knowledge Retrieval</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .search-container { margin-top: 50px; margin-bottom: 30px; }
        .table-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .score-badge { font-weight: bold; color: #0d6efd; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center search-container">
        <div class="col-md-8 text-center">
            <h1 class="mb-4">🔍 Genshin Search Engine</h1>
            
            <form action="/search" method="get" class="input-group input-group-lg">
                <input type="text" name="query" class="form-control" placeholder="Cari karakter, elemen, atau tim..." value="{{ query if query else '' }}" required>
                <button class="btn btn-primary" type="submit">Cari</button>
            </form>
        </div>
    </div>

    {% if results is not none %}
    <div class="row justify-content-center">
        <div class="col-md-10 table-container">
            <h5 class="mb-3">Hasil Pencarian untuk: <i>"{{ query }}"</i></h5>
            
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th style="width: 10%;">Rank</th>
                        <th style="width: 70%;">Nama File Dokumen</th>
                        <th style="width: 20%; text-align: center;">Skor Relevansi</th>
                    </tr>
                </thead>
                <tbody>
                    {% for filename, score in results %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td>
                            <div class="fw-bold text-dark">{{ filename }}</div>
                        </td>
                        <td class="text-center">
                            <span class="score-badge">{{ "%.4f"|format(score) }}</span>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center text-muted">Tidak ada hasil yang ditemukan.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
